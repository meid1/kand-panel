<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kand — админка</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0B0E14;--card:#141925;--cardhi:#1A2030;--line:#1b2740;--txt:#E5E7EB;--mut:#94A3B8;--acc:#22D3EE;--ok:#34D399;--bad:#F87171}
  *{box-sizing:border-box} body{margin:0;font:15px/1.45 'Inter',system-ui,Segoe UI,Roboto,sans-serif;letter-spacing:-.01em;background:radial-gradient(1200px 600px at 50% -10%, #0a1b2e 0%, var(--bg) 55%);color:var(--txt);-webkit-font-smoothing:antialiased}
  a{color:var(--acc)} button{cursor:pointer;font:inherit}
  .hidden{display:none!important}
  #login{max-width:340px;margin:12vh auto;padding:24px;background:var(--card);border:1px solid var(--line);border-radius:14px}
  #login h1{font-size:20px;margin:0 0 16px}
  input,textarea,select{width:100%;padding:10px 12px;background:#0c1119;border:1px solid var(--line);border-radius:10px;color:var(--txt);margin:6px 0;outline:none;transition:border-color .15s,box-shadow .15s}
  input:focus,textarea:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(34,211,238,.13)}
  input::placeholder,textarea::placeholder{color:#5b6b86}
  textarea{min-height:80px;resize:vertical}
  .btn{background:var(--acc);border:1px solid transparent;color:#04121a;font-weight:600;padding:9px 15px;border-radius:10px;line-height:1;transition:filter .15s,transform .05s,background .15s}
  .btn:hover{filter:brightness(1.08)} .btn:active{transform:translateY(1px)} .btn:disabled{opacity:.4;cursor:not-allowed;filter:none}
  .btn.sec{background:#1a2233;border-color:var(--line);color:var(--txt)} .btn.sec:hover{background:#232f45;filter:none}
  .btn.bad{background:rgba(248,113,113,.14);border-color:rgba(248,113,113,.42);color:#fca5a5} .btn.bad:hover{background:rgba(248,113,113,.24);filter:none}
  .btn.sm{padding:6px 10px;font-size:12.5px;border-radius:8px}
  #app{display:flex;min-height:100vh}
  .side{width:230px;flex:0 0 230px;background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;padding:16px 12px}
  .side-top{display:flex;align-items:center;gap:10px;padding:4px 8px 16px}
  .side-top .logo{font-size:22px;color:var(--acc)} .side-top b{font-size:16px}
  .side nav{display:flex;flex-direction:column;gap:3px;overflow-y:auto;flex:1;scrollbar-width:none}
  .side nav::-webkit-scrollbar{display:none}
  .side nav button{display:flex;align-items:center;gap:11px;text-align:left;background:transparent;border:0;color:var(--mut);padding:10px 12px;border-radius:10px;font-size:14px;width:100%}
  .side nav button:hover{background:#1a2233;color:var(--txt)}
  .side nav button.on{background:rgba(34,211,238,.12);color:var(--acc);font-weight:600}
  .side nav button .nic{flex:none;opacity:.9} .side nav button.on .nic{opacity:1}
  .srv{display:flex;align-items:center;gap:12px;padding:11px 4px;border-top:1px solid var(--line)}
  .srv:first-child{border-top:0}
  .srv .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .srv .dot.on{background:var(--ok);box-shadow:0 0 8px rgba(52,211,153,.5)} .srv .dot.off{background:#5b6b86}
  .srv .dot.warn{background:#fbbf24;box-shadow:0 0 8px rgba(251,191,36,.5)}
  .srv .name{background:#0e1626;border:1px solid var(--line);border-radius:9px;padding:6px 10px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:8px}
  .sw{position:relative;width:42px;height:24px;border-radius:20px;background:#2a3550;border:0;cursor:pointer;transition:.15s;flex:none}
  .sw.on{background:var(--acc)} .sw::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s} .sw.on::after{left:21px}
  .side-foot{padding-top:12px;margin-top:8px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
  main{flex:1;max-width:1120px;margin:0 auto;padding:24px;min-width:0}
  #burger{display:none}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin:0 0 14px}
  .card b{font-size:15px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .grow{flex:1} .mut{color:var(--mut);font-size:13px} .pill{font-size:11.5px;padding:3px 9px;border-radius:20px;background:#1a2233;border:1px solid var(--line)}
  .pill.ok{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.3);color:var(--ok)} .pill.bad{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.3);color:var(--bad)}
  .pill.warn{background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.3);color:#fbbf24}
  .pill.brand{background:rgba(139,92,246,.14);border-color:rgba(139,92,246,.35);color:#c4b5fd}
  .phead{margin:0 0 4px} .phead h2{margin:0;font-size:22px} .phead .sub{color:var(--mut);font-size:13px;margin-top:2px}
  .qbtn{background:#1a2233;border:1px solid var(--line);color:var(--mut);padding:7px 12px;border-radius:9px;font-size:13px} .qbtn.on{background:rgba(34,211,238,.12);border-color:var(--acc);color:var(--acc)}
  table{width:100%;border-collapse:collapse} td,th{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line);font-size:14px}
  th{color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em} tbody tr:hover,table tr:hover{background:rgba(255,255,255,.02)}
  label.fld{display:block;margin:10px 0 2px;color:var(--mut);font-size:13px}
  code{background:#0c1119;padding:2px 6px;border-radius:6px;word-break:break-all}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#0c1119;border:1px solid var(--line);padding:10px 16px;border-radius:10px;z-index:60}
  .umodal{position:fixed;inset:0;background:rgba(3,7,18,.72);backdrop-filter:blur(2px);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:24px 14px;overflow:auto}
  .umodal-box{max-width:600px;width:100%;max-height:90vh;overflow:auto;margin:0}
  /* мобильный: меню — одна прокручиваемая лента, а не блок на весь экран */
  @media (max-width: 820px){
    #app{display:block}
    .side{position:fixed;left:-244px;top:0;z-index:20;transition:left .2s;box-shadow:0 0 40px rgba(0,0,0,.55)}
    #app.nav-open .side{left:0}
    #app.nav-open::after{content:'';position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:19}
    #burger{display:inline-flex;align-items:center;position:fixed;top:10px;left:10px;z-index:22;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:9px 13px;font-size:16px}
    main{padding:56px 12px 12px}
    .card{padding:13px;border-radius:14px}
    table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
    input,select,textarea{font-size:16px}
  }
  /* ── премиум-полировка ── */
  .card{background:linear-gradient(180deg,#161c2b,#131826);box-shadow:0 1px 0 rgba(255,255,255,.02) inset,0 10px 28px -14px rgba(0,0,0,.55)}
  .btn{background:linear-gradient(180deg,#2ee0f5,#1cc4da);box-shadow:0 6px 18px -8px rgba(34,211,238,.6)}
  .btn.sec,.btn.bad{background-image:none;box-shadow:none}
  .side{background:linear-gradient(180deg,#141a28,#111623)}
  .side nav button.on{box-shadow:inset 3px 0 0 var(--acc)}
  .side-top b{background:linear-gradient(90deg,#eef2f7,#7fd6e6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  th{background:rgba(255,255,255,.015)} table tr:last-child td{border-bottom:0}
  .pill{font-weight:600}
  input:hover,select:hover,textarea:hover{border-color:#2a3956}
  #login{box-shadow:0 24px 60px -20px rgba(0,0,0,.7)}
</style>
</head>
<body>
<div id="login">
  <h1>Kand — вход</h1>
  <div id="ver_login" class="mut" style="text-align:center;font-size:12px;margin:-6px 0 10px"></div>
  <input id="pw" type="password" placeholder="Пароль администратора" autocomplete="current-password">
  <button class="btn" style="width:100%" onclick="doLogin()">Войти</button>
  <div id="loginErr" class="mut" style="color:var(--bad);margin-top:8px"></div>
</div>

<div id="app" class="hidden">
  <button id="burger" onclick="document.getElementById('app').classList.toggle('nav-open')">☰</button>
  <aside class="side">
    <div class="side-top"><span class="logo">🛡</span><div><b>Kand</b> <span id="ver" class="mut" style="font-size:11px"></span><div class="mut" style="font-size:11px">Админ-панель</div></div></div>
    <nav>
      <button data-tab="dashboard" class="on">📊 Дашборд</button>
      <button data-tab="users">👥 Клиенты</button>
      <button data-tab="txns">💳 Платежи</button>
      <button data-tab="finance">💰 Финансы</button>
      <button data-tab="nodes">🖥 Серверы</button>
      <button data-tab="traffic">📈 Трафик</button>
      <button data-tab="hwid">🔐 HWID</button>
      <button data-tab="tickets">🎫 Поддержка</button>
      <button data-tab="promo">🎟 Промокоды</button>
      <button data-tab="gifts">🎁 Подарки</button>
      <button data-tab="promogroups">🎯 Промо-группы</button>
      <button data-tab="campaigns">📢 Кампании</button>
      <button data-tab="withdrawals">💸 Выводы</button>
      <button data-tab="polls">📊 Опросы</button>
      <button data-tab="payments">💠 Платёжки</button>
      <button data-tab="broadcast">📣 Рассылка</button>
      <button data-tab="tenants">🏷 Франшизы</button>
      <button data-tab="texts">✏️ Тексты и кнопки</button>
      <button data-tab="plans">📦 Тарифы</button>
      <button data-tab="brand">🎨 Бренд</button>
      <button data-tab="audit">🧾 Аудит</button>
    </nav>
    <div class="side-foot">
      <div class="mut" style="font-size:12px">Вход как<br>admin</div>
      <button class="btn sec sm" onclick="logout()">⎋ Выйти</button>
    </div>
  </aside>
  <main>
    <div id="tab-dashboard"></div>
    <div id="tab-nodes" class="hidden"></div>
    <div id="tab-users" class="hidden"></div>
    <div id="tab-texts" class="hidden"></div>
    <div id="tab-plans" class="hidden"></div>
    <div id="tab-promo" class="hidden"></div>
    <div id="tab-gifts" class="hidden"></div>
    <div id="tab-promogroups" class="hidden"></div>
    <div id="tab-campaigns" class="hidden"></div>
    <div id="tab-withdrawals" class="hidden"></div>
    <div id="tab-polls" class="hidden"></div>
    <div id="tab-payments" class="hidden"></div>
    <div id="tab-traffic" class="hidden"></div>
    <div id="tab-hwid" class="hidden"></div>
    <div id="tab-tickets" class="hidden"></div>
    <div id="tab-txns" class="hidden"></div>
    <div id="tab-finance" class="hidden"></div>
    <div id="tab-broadcast" class="hidden"></div>
    <div id="tab-tenants" class="hidden"></div>
    <div id="tab-brand" class="hidden"></div>
    <div id="tab-audit" class="hidden"></div>
  </main>
</div>
<script src="/app.js"></script>
</body>
</html>
